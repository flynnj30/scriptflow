<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ScriptFlow Pro | Smart Call Scripts + Priority Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05);
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient-start: #e0e7ff;
            --gradient-end: #f1f5f9;
            --script-bg: #f1f5f9;
            --nav-hover: #f1f5f9;
            --tooltip-bg: #1e293b;
            --help-bg: #f1f5f9;
            --cal-day-bg: #ffffff;
            --cal-day-hover: #e0e7ff;
        }
        
        body.dark {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-sidebar: #0f172a;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.3);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.3);
            --gradient-start: #0f172a;
            --gradient-end: #1e1b4b;
            --script-bg: #0f172a;
            --nav-hover: #334155;
            --tooltip-bg: #334155;
            --help-bg: #1e293b;
            --cal-day-bg: #1e293b;
            --cal-day-hover: #3b82f6;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-radius: 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        h1 { 
            font-size: 1.5rem; 
            font-weight: 700;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        h1 i { margin-right: 10px; color: var(--primary); }
        
        .status-group { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .badge { 
            padding: 8px 20px; 
            border-radius: 40px; 
            font-weight: 600; 
            font-size: 0.8rem; 
            cursor: pointer; 
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .badge-primary { background: linear-gradient(135deg, var(--secondary), var(--primary)); color: white; }
        .badge-success { background: var(--success); color: white; }
        
        .icon-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 40px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            position: relative;
        }
        .icon-btn:hover { transform: translateY(-2px); background: var(--primary); color: white; border-color: var(--primary); }
        .icon-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--tooltip-bg);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            margin-bottom: 8px;
            z-index: 100;
        }
        .icon-btn:hover::after { opacity: 1; }
        
        .tracker-summary {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--bg-primary);
            padding: 6px 16px;
            border-radius: 60px;
            border: 1px solid var(--border-color);
        }
        .stat-pill { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; }
        .stat-pill .number { font-weight: 800; color: var(--primary); }
        
        .main-grid { display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
        
        .nav-sidebar {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border-color);
            height: fit-content;
            transition: all 0.3s ease;
        }
        .section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 6px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
            font-size: 0.9rem;
            position: relative;
        }
        .nav-item:hover { background: var(--nav-hover); transform: translateX(4px); }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { width: 24px; }
        .key-hint {
            position: absolute;
            right: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            background: var(--bg-primary);
            padding: 2px 8px;
            border-radius: 20px;
            color: var(--primary);
            border: 1px solid var(--border-color);
        }
        .nav-item.active .key-hint { background: rgba(255,255,255,0.25); color: white; }
        .nav-actions { display: flex; gap: 6px; margin-left: auto; margin-right: 30px; }
        .nav-icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .nav-icon-btn:hover { background: var(--bg-primary); color: var(--primary); }
        
        .script-area {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        .script-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border-color);
        }
        .script-title { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .action-buttons { display: flex; gap: 8px; }
        .version-indicator { font-size: 0.7rem; background: var(--bg-primary); padding: 4px 12px; border-radius: 20px; color: var(--text-secondary); }
        
        .script-display {
            background: var(--script-bg);
            border-radius: 20px;
            padding: 28px;
            min-height: 520px;
            line-height: 1.8;
            font-size: 1rem;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            font-family: 'Inter', monospace;
        }
        .edit-textarea {
            width: 100%;
            min-height: 520px;
            background: var(--bg-primary);
            border: 2px solid var(--warning);
            border-radius: 20px;
            padding: 20px;
            color: var(--text-primary);
            font-family: 'Inter', monospace;
            font-size: 1rem;
            line-height: 1.8;
            resize: vertical;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5000;
            animation: fadeIn 0.2s ease;
        }
        .modal-card {
            background: var(--bg-secondary);
            border-radius: 32px;
            width: 750px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            transition: all 0.3s ease;
        }
        .calendar-modal { width: 900px; max-width: 95%; }
        .report-modal { width: 600px; }
        .help-modal { width: 650px; }
        .priority-modal { width: 700px; max-width: 95%; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.8rem; color: var(--text-secondary); }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
        }
        
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .cal-month-year { font-weight: 800; font-size: 1.3rem; color: var(--primary); }
        .cal-nav { display: flex; gap: 12px; }
        .cal-nav button {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--text-primary);
        }
        .cal-nav button:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.75rem; font-weight: 700; margin-bottom: 12px; color: var(--text-secondary); }
        .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 24px; }
        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            background: var(--cal-day-bg);
            transition: all 0.2s;
            position: relative;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .cal-day:hover { background: var(--primary); color: white; transform: scale(1.02); border-color: var(--primary); }
        .cal-day.selected { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(59,130,246,0.3); border-color: var(--primary); }
        .cal-day.has-appointment::after { content: '📅'; font-size: 0.55rem; position: absolute; bottom: 2px; right: 4px; }
        .appointment-card {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid var(--success);
            transition: all 0.3s ease;
        }
        .appointment-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
        .edit-appt-btn, .delete-appt-btn {
            background: transparent;
            border: none;
            font-size: 0.75rem;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 20px;
            transition: all 0.2s;
            font-weight: 500;
        }
        .edit-appt-btn { color: var(--primary); border: 1px solid var(--border-color); background: var(--bg-secondary); }
        .delete-appt-btn { color: var(--danger); border: 1px solid var(--border-color); background: var(--bg-secondary); }
        .edit-appt-btn:hover, .delete-appt-btn:hover { transform: translateY(-1px); background: var(--bg-primary); }
        .copy-btn-sm {
            background: transparent;
            border: none;
            color: var(--primary);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .copy-btn-sm:hover { background: var(--border-color); }
        .goal-input-group { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
        .goal-input-group input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); }
        
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--success);
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            z-index: 6000;
            animation: slideIn 0.3s ease;
            box-shadow: var(--shadow-lg);
            font-size: 0.8rem;
            font-weight: 500;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .footer { text-align: center; margin-top: 32px; padding: 20px; font-size: 0.7rem; color: var(--text-secondary); border-top: 1px solid var(--border-color); }
        .search-box {
            width: 100%;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            margin-bottom: 16px;
        }
        .date-changer { display: flex; align-items: center; gap: 8px; margin: 16px 0; }
        .date-changer input { flex: 1; border-radius: 40px; border: 1px solid var(--border-color); padding: 8px 12px; background: var(--bg-primary); color: var(--text-primary); }
        
        .timezone-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin: 20px 0; }
        .timezone-card {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            border: 2px solid var(--border-color);
            transition: all 0.3s ease;
        }
        .timezone-card.recommended { border-color: var(--success); background: linear-gradient(135deg, rgba(16,185,129,0.1), rgba(59,130,246,0.1)); }
        .timezone-name { font-weight: 800; font-size: 1.1rem; }
        .timezone-time { font-size: 1.4rem; font-weight: 800; margin: 8px 0; color: var(--primary); }
        .best-time-high { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .best-time-good { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .best-time-bad { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .best-time-badge { display: inline-block; padding: 6px 14px; border-radius: 30px; font-weight: 700; font-size: 0.75rem; margin-top: 10px; }
        .recommendation-card {
            background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(59,130,246,0.15));
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            border: 2px solid var(--success);
        }
        .priority-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 20px;
            text-align: center;
        }
        .help-step {
            background: var(--help-bg);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-microphone-alt"></i> ScriptFlow Pro</h1>
            <div class="status-group">
                <div class="tracker-summary">
                    <div class="stat-pill"><i class="fas fa-calendar-day"></i> Today: <span class="number" id="statToday">0</span>/<span id="goalDaily">3</span></div>
                    <div class="stat-pill"><i class="fas fa-calendar-week"></i> Week: <span class="number" id="statWeek">0</span>/<span id="goalWeekly">15</span></div>
                    <div class="stat-pill"><i class="fas fa-calendar-alt"></i> Month: <span class="number" id="statMonth">0</span>/<span id="goalMonthly">60</span></div>
                    <button class="icon-btn" id="openCalendarBtn" data-tooltip="Appointment Calendar"><i class="fas fa-calendar-alt"></i></button>
                    <button class="icon-btn" id="quickReportBtn" data-tooltip="Quick Add Appointment"><i class="fas fa-plus-circle"></i></button>
                    <button class="icon-btn" id="userNameBtn" data-tooltip="Set Your Name"><i class="fas fa-user-circle"></i></button>
                    <button class="icon-btn" id="priorityBtn" data-tooltip="Real-Time Call Priority"><i class="fas fa-chart-line"></i></button>
                </div>
                <div class="badge badge-primary"><i class="fas fa-scroll"></i> <span id="scriptCount">0</span></div>
                <div class="badge badge-success" id="saveStatus"><i class="fas fa-save"></i> Auto</div>
                <button class="icon-btn" id="historyBtn" data-tooltip="Version History (Ctrl+Z)"><i class="fas fa-history"></i></button>
                <button class="icon-btn" id="resetAllBtn" data-tooltip="Factory Reset"><i class="fas fa-trash-alt"></i></button>
                <button class="icon-btn" id="themeToggle" data-tooltip="Dark/Light Mode"><i class="fas fa-moon"></i></button>
                <button class="icon-btn" id="helpBtn" data-tooltip="User Guide"><i class="fas fa-question-circle"></i></button>
            </div>
        </div>
        
        <div class="main-grid">
            <div class="nav-sidebar">
                <div class="section-title">
                    <span><i class="fas fa-bars"></i> CALL SCRIPTS</span>
                    <button class="icon-btn" id="addScriptBtn" data-tooltip="Add New Script" style="padding:4px 10px;"><i class="fas fa-plus"></i></button>
                </div>
                <input type="text" id="scriptSearch" class="search-box" placeholder="Search scripts...">
                <div id="scriptNavList"></div>
                <div style="margin-top: 16px; padding: 8px; font-size:0.65rem; background:var(--bg-primary); border-radius:20px; text-align:center; color:var(--text-secondary);">
                    <i class="fas fa-crown"></i> Press 1-9 to switch scripts
                </div>
            </div>
            
            <div class="script-area">
                <div class="script-header">
                    <div class="script-title">
                        <i class="fas fa-scroll"></i> <span id="currentScriptName">Opening Script</span>
                        <span id="activeShortcutHint" style="font-size:0.7rem; background:var(--bg-primary); padding:2px 10px; border-radius:20px;"><i class="fas fa-key"></i> Key: —</span>
                        <span id="versionIndicator" class="version-indicator"><i class="fas fa-clock"></i> v<span id="versionNumber">1</span></span>
                    </div>
                    <div class="action-buttons">
                        <button class="icon-btn" id="editScriptBtn" data-tooltip="Edit Script"><i class="fas fa-pen"></i></button>
                        <button class="icon-btn" id="saveScriptBtn" data-tooltip="Save Changes" style="display:none;"><i class="fas fa-save"></i></button>
                        <button class="icon-btn" id="cancelEditBtn" data-tooltip="Cancel Edit" style="display:none;"><i class="fas fa-times"></i></button>
                        <button class="icon-btn" id="copyScriptBtn" data-tooltip="Copy Script"><i class="fas fa-copy"></i></button>
                        <button class="icon-btn" id="resetScriptBtn" data-tooltip="Reset to Original"><i class="fas fa-undo-alt"></i></button>
                        <button class="icon-btn" id="undoBtn" data-tooltip="Undo (Ctrl+Z)"><i class="fas fa-undo"></i></button>
                        <button class="icon-btn" id="redoBtn" data-tooltip="Redo (Ctrl+Y)"><i class="fas fa-redo"></i></button>
                    </div>
                </div>
                <div id="scriptContent"></div>
            </div>
        </div>
        <div class="footer"><i class="fas fa-magic"></i> Click calendar to manage appointments · Edit/Delete appointments in calendar view</div>
    </div>

    <script>
        // =============================================
        // COMPLETE SCRIPTFLOW PRO - FULLY FUNCTIONAL
        // =============================================
        
        let userName = localStorage.getItem('scriptflow_user_name') || 'Flynn';
        function setUserName() { const newName = prompt('Enter your name:', userName); if (newName?.trim()) { userName = newName.trim(); localStorage.setItem('scriptflow_user_name', userName); showToast(`Name set to: ${userName}`); if (!isEditing) loadScript(currentScriptId); } }
        function replaceNameInScript(content) { return content.replace(/\[Your Name\]/gi, userName); }
        
        // =============================================
        // APPOINTMENT SYSTEM
        // =============================================
        let appointments = {};
        let goals = { daily: 3, weekly: 15, monthly: 60 };
        
        function loadAppointmentData() {
            const saved = localStorage.getItem('scriptflow_appointments_main');
            if (saved) appointments = JSON.parse(saved);
            const savedGoals = localStorage.getItem('scriptflow_goals_main');
            if (savedGoals) goals = JSON.parse(savedGoals);
            updateStats();
        }
        function saveAppointments() { localStorage.setItem('scriptflow_appointments_main', JSON.stringify(appointments)); updateStats(); }
        function saveGoals() { localStorage.setItem('scriptflow_goals_main', JSON.stringify(goals)); updateStats(); }
        
        function getTodayStr() { return new Date().toISOString().split('T')[0]; }
        function getTodayCount() { return appointments[getTodayStr()]?.reports?.length || 0; }
        function getWeekCount() {
            const now = new Date(); const start = new Date(now); start.setDate(now.getDate() - now.getDay()); const end = new Date(start); end.setDate(start.getDate() + 6);
            let total = 0;
            for (let d in appointments) { const date = new Date(d); if (date >= start && date <= end && appointments[d].reports) total += appointments[d].reports.length; }
            return total;
        }
        function getMonthCount() {
            const now = new Date(); const start = new Date(now.getFullYear(), now.getMonth(), 1); const end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            let total = 0;
            for (let d in appointments) { const date = new Date(d); if (date >= start && date <= end && appointments[d].reports) total += appointments[d].reports.length; }
            return total;
        }
        function updateStats() {
            document.getElementById('statToday').innerText = getTodayCount();
            document.getElementById('statWeek').innerText = getWeekCount();
            document.getElementById('statMonth').innerText = getMonthCount();
            document.getElementById('goalDaily').innerText = goals.daily;
            document.getElementById('goalWeekly').innerText = goals.weekly;
            document.getElementById('goalMonthly').innerText = goals.monthly;
        }
        
        function addAppointment(dateStr, business, contactName, role, phone, time, notes, assigned, editId = null) {
            if (!appointments[dateStr]) appointments[dateStr] = { count: 0, note: '', reports: [] };
            if (!appointments[dateStr].reports) appointments[dateStr].reports = [];
            const reportText = `Business: ${business}\nContact: ${contactName}\nRole: ${role}\nPhone: ${phone}\nTime: ${time}\nNotes: ${notes}\nAssigned to: ${assigned}`;
            const newAppointment = { id: editId || Date.now(), business, contactName, role, phone, time, notes, assigned, createdAt: new Date().toISOString(), fullText: reportText };
            if (editId) {
                const index = appointments[dateStr].reports.findIndex(r => r.id === editId);
                if (index !== -1) appointments[dateStr].reports[index] = newAppointment;
            } else {
                appointments[dateStr].reports.unshift(newAppointment);
            }
            appointments[dateStr].reports.sort((a,b) => b.id - a.id);
            appointments[dateStr].count = appointments[dateStr].reports.length;
            appointments[dateStr].note = appointments[dateStr].note || `${appointments[dateStr].reports.length} appointment(s)`;
            saveAppointments();
            return reportText;
        }
        
        function deleteAppointment(dateStr, id) {
            if (appointments[dateStr] && appointments[dateStr].reports) {
                appointments[dateStr].reports = appointments[dateStr].reports.filter(r => r.id !== id);
                appointments[dateStr].count = appointments[dateStr].reports.length;
                if (appointments[dateStr].reports.length === 0) delete appointments[dateStr];
                else appointments[dateStr].note = `${appointments[dateStr].reports.length} appointment(s)`;
                saveAppointments();
                return true;
            }
            return false;
        }

        // PRIORITY PREDICTOR

        function getAdvancedPriorityAnalysis() {
            const now = new Date();
            const dayOfWeek = now.getDay();
            const hour = now.getHours();
            const minute = now.getMinutes();
            
            const dayScores = {
                0: { name: "Sunday", score: 5, multiplier: 0.2, note: "❌ Closed - Do not call" },
                1: { name: "Monday", score: 65, multiplier: 0.65, note: "⚠️ Slow start - Call after 10 AM" },
                2: { name: "Tuesday", score: 92, multiplier: 0.92, note: "🔥 BEST DAY - Peak decision-maker availability" },
                3: { name: "Wednesday", score: 95, multiplier: 0.95, note: "🔥 BEST DAY - Maximum availability" },
                4: { name: "Thursday", score: 90, multiplier: 0.90, note: "✅ Excellent - Strong availability" },
                5: { name: "Friday", score: 55, multiplier: 0.55, note: "⚠️ Poor - Call before 2 PM" },
                6: { name: "Saturday", score: 15, multiplier: 0.15, note: "❌ Very poor - Avoid" }
            };
            
            const getTimeScore = (h, m) => {
                const totalMinutes = h * 60 + m;
                if (totalMinutes >= 480 && totalMinutes < 540) return 35;
                if (totalMinutes >= 540 && totalMinutes < 600) return 55;
                if (totalMinutes >= 600 && totalMinutes < 690) return 95;
                if (totalMinutes >= 690 && totalMinutes < 780) return 40;
                if (totalMinutes >= 780 && totalMinutes < 840) return 50;
                if (totalMinutes >= 840 && totalMinutes < 960) return 88;
                if (totalMinutes >= 960 && totalMinutes < 1020) return 65;
                if (totalMinutes >= 1020) return 15;
                return 10;
            };
            
            const timeZones = [
                { name: "ET", zone: "America/New_York", label: "Eastern Time", abbreviation: "ET", cities: "New York, Miami, Atlanta" },
                { name: "CT", zone: "America/Chicago", label: "Central Time", abbreviation: "CT", cities: "Chicago, Dallas, Houston" },
                { name: "MT", zone: "America/Denver", label: "Mountain Time", abbreviation: "MT", cities: "Denver, Phoenix, Salt Lake" },
                { name: "PT", zone: "America/Los_Angeles", label: "Pacific Time", abbreviation: "PT", cities: "Los Angeles, Seattle, San Francisco" }
            ];
            
            const zones = timeZones.map(tz => {
                const tzTime = new Date(now.toLocaleString("en-US", { timeZone: tz.zone }));
                const tzHour = tzTime.getHours();
                const tzMinute = tzTime.getMinutes();
                const timeScore = getTimeScore(tzHour, tzMinute);
                const dayScore = dayScores[tzTime.getDay()].score;
                const combinedScore = Math.floor((timeScore * 0.7) + (dayScore * 0.3));
                
                let priority = "", priorityClass = "", successRate = "";
                if (combinedScore >= 85) { priority = "OPTIMAL - Call NOW!"; priorityClass = "best-time-high"; successRate = "85-95% success rate"; }
                else if (combinedScore >= 70) { priority = "GOOD - Recommended"; priorityClass = "best-time-good"; successRate = "70-85% success rate"; }
                else if (combinedScore >= 50) { priority = "FAIR - Might connect"; priorityClass = "best-time-good"; successRate = "50-70% success rate"; }
                else { priority = "POOR - Avoid if possible"; priorityClass = "best-time-bad"; successRate = "<50% success rate"; }
                
                return { ...tz, timeStr: tzTime.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }), isBusinessHours: tzHour >= 9 && tzHour < 17, dayName: dayScores[tzTime.getDay()].name, dayNote: dayScores[tzTime.getDay()].note, combinedScore, priority, priorityClass, successRate };
            });
            
            const sorted = [...zones].sort((a, b) => b.combinedScore - a.combinedScore);
            const bestZone = sorted[0];
            const recommendation = bestZone.combinedScore >= 85 ? `🎯 OPTIMAL: Call ${bestZone.abbreviation} businesses NOW (${bestZone.timeStr} local time). Expected success rate: ${bestZone.successRate}` : (bestZone.combinedScore >= 70 ? `✅ GOOD: ${bestZone.abbreviation} at ${bestZone.timeStr} local time. ${bestZone.successRate}` : `⏰ WAIT: Consider calling during prime hours (10-11:30 AM or 2-4 PM local time)`);
            
            return { zones, bestZone, recommendation, bestTimeSlots: ["10:00 AM - 11:30 AM (92% rate)", "2:00 PM - 4:00 PM (88% rate)", "9:00 AM - 10:00 AM (65% rate)"], bestDays: ["Tuesday (92%)", "Wednesday (95%)", "Thursday (90%)"] };
        }

            "objection_webguy": { name: "⚠️ Have a web guy", content: "💬 PROSPECT: \"I already have a web guy.\"\n\n✅ RESPONSE:\n→ \"That actually makes things easier.\"\n→ \"A lot of businesses we work with already have someone managing their site.\"\n→ \"They just like getting a second opinion or seeing a different creative direction.\"\n→ \"No commitment at all — just worth comparing.\"" },
            "objection_cost": { name: "💰 How much does it cost?", content: "💬 PROSPECT: \"How much does it cost?\"\n\n✅ RESPONSE:\n→ \"The preview itself is completely free.\"\n→ \"Daniel would only go over pricing if you actually like what you see.\"\n→ \"Right now it's really just about showing you the concept first.\"" },
            "objection_busy": { name: "⏰ I'm busy", content: "💬 PROSPECT: \"I'm busy.\"\n\n✅ RESPONSE:\n→ \"Totally understand — I caught you out of the blue.\"\n→ \"That's why I'm not trying to go through everything right now.\"\n→ \"What's easier for you — later today or sometime tomorrow for a quick 5–10 minute look?\"" },
            "objection_not_interested": { name: "❌ Not interested", content: "💬 PROSPECT: \"Not interested.\"\n\n✅ RESPONSE:\n→ \"No worries.\"\n→ \"Just so you know, we already built the preview, so there's nothing you need to buy or commit to.\"\n→ \"Worst case, you spend a few minutes looking at it and walk away with a few ideas for your online presence.\"\n→ \"Would it hurt to at least take a quick look?\"" },
            "objection_info": { name: "📧 Send me info", content: "💬 PROSPECT: \"Just send me info.\"\n\n✅ RESPONSE:\n→ \"I definitely can.\"\n→ \"The only reason I prefer a quick walkthrough is because the preview makes way more sense visually than through a long text or email.\"\n→ \"It honestly takes about 5 minutes.\"\n→ \"What's usually better for you — later today or tomorrow?\"" },
            "objection_found_me": { name: "🔍 How did you find me?", content: "💬 PROSPECT: \"How did you find me?\"\n\n✅ RESPONSE:\n→ \"I came across your Google listing while looking at businesses in your area and industry.\"\n→ \"Your business stood out, so we decided to create a sample website concept using publicly available information online.\"" },
            "objection_who_are_you": { name: "🏢 Who are you with?", content: "💬 PROSPECT: \"Who are you with?\"\n\n✅ RESPONSE:\n→ \"I'm with Canopy Designs.\"\n→ \"We help local and home service businesses improve their online presence and websites.\"\n→ \"The preview we built for you is completely free to look at.\"" },
            "closing": { name: "🏁 Closing Script", content: "🎯 CLOSING SCRIPT:\n\n→ \"Awesome, we're excited to show you the preview!\"\n→ \"I'll have Daniel give you a quick call [later/tomorrow].\"\n→ \"Appreciate your time, [Your Name]! Talk soon!\"\n\n📌 REMEMBER:\n✓ Always confirm the best number to call\n✓ Get the owner's name\n✓ Set a specific time for follow-up\n✓ Be friendly and professional" }
        };
        
        let scripts = {}, currentScriptId = "opening", isEditing = false, searchTerm = "", customOrder = [];
        let versionHistory = {}, currentVersionIndex = {};
        
        function initVersionHistory(id, content) { if (!versionHistory[id]) { versionHistory[id] = [{ content, timestamp: new Date().toISOString() }]; currentVersionIndex[id] = 0; } }
        function saveVersion(id, newContent) { if (!versionHistory[id]) { initVersionHistory(id, newContent); return; } if (currentVersionIndex[id] < versionHistory[id].length - 1) versionHistory[id] = versionHistory[id].slice(0, currentVersionIndex[id] + 1); versionHistory[id].push({ content: newContent, timestamp: new Date().toISOString() }); currentVersionIndex[id] = versionHistory[id].length - 1; if (versionHistory[id].length > 50) versionHistory[id].shift(); localStorage.setItem('scriptflow_version_history', JSON.stringify(versionHistory)); }
        function undoScript(id) { if (!versionHistory[id] || currentVersionIndex[id] <= 0) { showToast('No earlier version', true); return; } currentVersionIndex[id]--; scripts[id].content = versionHistory[id][currentVersionIndex[id]].content; saveAllScripts(); if (!isEditing && currentScriptId === id) loadScript(id); else if (isEditing && currentScriptId === id) document.getElementById('editTextarea').value = scripts[id].content; showToast('Undo'); }
        function redoScript(id) { if (!versionHistory[id] || currentVersionIndex[id] >= versionHistory[id].length - 1) { showToast('No newer version', true); return; } currentVersionIndex[id]++; scripts[id].content = versionHistory[id][currentVersionIndex[id]].content; saveAllScripts(); if (!isEditing && currentScriptId === id) loadScript(id); else if (isEditing && currentScriptId === id) document.getElementById('editTextarea').value = scripts[id].content; showToast('Redo'); }
        function loadScripts() { const saved = localStorage.getItem('scriptflow_pro_scripts_main'); if (saved) { scripts = JSON.parse(saved); for (let k of Object.keys(defaultScripts)) if (!scripts[k]) scripts[k] = {...defaultScripts[k]}; } else scripts = JSON.parse(JSON.stringify(defaultScripts)); const savedOrder = localStorage.getItem('scriptflow_order_main'); if (savedOrder) customOrder = JSON.parse(savedOrder); else customOrder = ["opening","owner_yes","owner_no","objection_website","objection_webguy","objection_cost","objection_busy","objection_not_interested","objection_info","objection_found_me","objection_who_are_you","closing"]; const savedHistory = localStorage.getItem('scriptflow_version_history'); if (savedHistory) versionHistory = JSON.parse(savedHistory); for (let id in scripts) { if (!versionHistory[id]) initVersionHistory(id, scripts[id].content); else currentVersionIndex[id] = versionHistory[id].length - 1; } document.getElementById('scriptCount').innerText = Object.keys(scripts).length; }
        function saveAllScripts() { localStorage.setItem('scriptflow_pro_scripts_main', JSON.stringify(scripts)); localStorage.setItem('scriptflow_order_main', JSON.stringify(customOrder)); document.getElementById('saveStatus').innerHTML = '✓ Saved'; setTimeout(() => { if(!isEditing) document.getElementById('saveStatus').innerHTML = 'Auto'; }, 1500); }
        function getOrderedVisible() { let ids = [...customOrder.filter(id=>scripts[id]), ...Object.keys(scripts).filter(id=>!customOrder.includes(id))]; if (searchTerm) ids = ids.filter(id => scripts[id].name.toLowerCase().includes(searchTerm.toLowerCase())); return ids; }
        function getKeyMapping() { const vis = getOrderedVisible(); const map = new Map(); vis.slice(0,9).forEach((id,i)=>map.set((i+1).toString(),id)); return map; }
        function escapeHtml(s) { return s ? String(s).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])) : ''; }
        function renderNavigation() { const container = document.getElementById('scriptNavList'); const visible = getOrderedVisible(); if (!visible.length) { container.innerHTML='<div style="padding:20px;text-align:center;">No scripts found</div>'; return; } let html=''; visible.forEach((id, idx)=>{ const s=scripts[id]; const active=currentScriptId===id; const shortcut=idx<9?`${idx+1}`:null; html+=`<div class="nav-item ${active?'active':''}" data-id="${id}"><i class="fas fa-scroll"></i><span>${escapeHtml(s.name)}</span>${shortcut?`<span class="key-hint">${shortcut}</span>`:''}<div class="nav-actions"><button class="nav-icon-btn rename-btn" data-id="${id}"><i class="fas fa-pencil-alt"></i></button><button class="nav-icon-btn delete-btn" data-id="${id}" ${id==='opening'?'disabled style="opacity:0.4;"':''}><i class="fas fa-trash"></i></button></div></div>`; }); container.innerHTML=html; document.querySelectorAll('.nav-item').forEach(el=>{ const sid=el.getAttribute('data-id'); el.addEventListener('click',(e)=>{ if(e.target.closest('.rename-btn')||e.target.closest('.delete-btn')) return; if(isEditing && confirm('Cancel editing?')) cancelEdit(); if(!isEditing && sid) loadScript(sid); }); }); document.querySelectorAll('.rename-btn').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); const id=btn.getAttribute('data-id'); const newName=prompt('New name:',scripts[id].name); if(newName?.trim()){ scripts[id].name=newName.trim(); saveAllScripts(); renderNavigation(); if(currentScriptId===id) document.getElementById('currentScriptName').innerHTML=scripts[id].name; showToast('Renamed'); } })); document.querySelectorAll('.delete-btn').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); const id=btn.getAttribute('data-id'); if(id==='opening'){ showToast('Cannot delete opening script', true); return; } if(confirm('Delete this script?')){ delete scripts[id]; delete versionHistory[id]; customOrder=customOrder.filter(i=>i!==id); if(currentScriptId===id) loadScript('opening'); saveAllScripts(); renderNavigation(); document.getElementById('scriptCount').innerText=Object.keys(scripts).length; showToast('Script deleted'); } })); const visibleIds=getOrderedVisible(); const idxCur=visibleIds.indexOf(currentScriptId); document.getElementById('activeShortcutHint').innerHTML=idxCur!==-1&&idxCur<9?`Key: ${idxCur+1}`:`Key: —`; if(versionHistory[currentScriptId]) document.getElementById('versionNumber').innerText=`${currentVersionIndex[currentScriptId]+1}/${versionHistory[currentScriptId].length}`; }
        function loadScript(id) { if(!scripts[id]||isEditing) return; currentScriptId=id; document.getElementById('currentScriptName').innerHTML=scripts[id].name; const displayContent=replaceNameInScript(scripts[id].content); document.getElementById('scriptContent').innerHTML=`<div class="script-display">${escapeHtml(displayContent).replace(/\n/g,'<br>')}</div>`; renderNavigation(); }
        function enterEdit() { isEditing=true; document.getElementById('editScriptBtn').style.display='none'; document.getElementById('saveScriptBtn').style.display='inline-flex'; document.getElementById('cancelEditBtn').style.display='inline-flex'; document.getElementById('scriptContent').innerHTML=`<textarea id="editTextarea" class="edit-textarea">${escapeHtml(scripts[currentScriptId].content)}</textarea>`; document.getElementById('editTextarea').focus(); document.getElementById('saveStatus').innerHTML='Editing'; }
        function saveEdit() { const newContent=document.getElementById('editTextarea').value; scripts[currentScriptId].content=newContent; saveVersion(currentScriptId, newContent); saveAllScripts(); cancelEdit(); showToast('Saved!'); }
        function cancelEdit() { isEditing=false; document.getElementById('editScriptBtn').style.display='inline-flex'; document.getElementById('saveScriptBtn').style.display='none'; document.getElementById('cancelEditBtn').style.display='none'; loadScript(currentScriptId); document.getElementById('saveStatus').innerHTML='Auto'; }
        function copyScript() { const content=replaceNameInScript(scripts[currentScriptId].content); copyToClipboard(content); }
        function resetScript() { if(defaultScripts[currentScriptId]){ if(confirm('Reset to original content?')){ scripts[currentScriptId]={...defaultScripts[currentScriptId]}; saveVersion(currentScriptId, scripts[currentScriptId].content); saveAllScripts(); loadScript(currentScriptId); showToast('Reset complete'); } } else showToast('No default version', true); }
        function addScript() { if(isEditing){ showToast('Finish editing first', true); return; } const name=prompt('Enter script name:'); if(!name) return; const id='custom_'+Date.now()+'_'+Math.random().toString(36).substr(2,6); scripts[id]={name, content:'Write your custom script here...'}; initVersionHistory(id, scripts[id].content); customOrder.push(id); saveAllScripts(); renderNavigation(); loadScript(id); showToast(`Added: ${name}`); }
        function showVersionHistoryModal(id) { if (!versionHistory[id]) { showToast('No history', true); return; } const modal = document.createElement('div'); modal.className = 'modal-overlay'; let html = `<div class="modal-card"><h3>Version History: ${escapeHtml(scripts[id].name)}</h3>`; versionHistory[id].forEach((v, idx) => { html += `<div class="version-item" data-index="${idx}" style="padding:12px; cursor:pointer; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between;"><span>${new Date(v.timestamp).toLocaleString()}</span><span>${idx === currentVersionIndex[id] ? '✓ Current' : 'Restore'}</span></div>`; }); html += `<div class="modal-buttons" style="margin-top:16px;"><button class="icon-btn" id="closeHistoryBtn">Close</button></div></div>`; modal.innerHTML = html; document.body.appendChild(modal); document.querySelectorAll('.version-item').forEach(el => { el.addEventListener('click', () => { const idx = parseInt(el.getAttribute('data-index')); currentVersionIndex[id] = idx; scripts[id].content = versionHistory[id][idx].content; saveAllScripts(); if (!isEditing) loadScript(id); else if (isEditing && currentScriptId === id) document.getElementById('editTextarea').value = scripts[id].content; document.getElementById('versionNumber').innerText = `${idx+1}/${versionHistory[id].length}`; showToast('Version restored'); modal.remove(); }); }); document.getElementById('closeHistoryBtn').addEventListener('click', () => modal.remove()); modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); }); }
        function initKeyboard() { window.addEventListener('keydown',(e)=>{ if(e.key>='1'&&e.key<='9'&&!isEditing&&!e.target.matches('textarea,input')){ e.preventDefault(); const target=getKeyMapping().get(e.key); if(target&&scripts[target]){ loadScript(target); showToast(scripts[target].name); } } if(e.key==='Escape'&&isEditing){ cancelEdit(); } if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!isEditing){ e.preventDefault(); undoScript(currentScriptId); } if((e.ctrlKey||e.metaKey)&&e.key==='y'&&!isEditing){ e.preventDefault(); redoScript(currentScriptId); } }); }
        function initTheme() { const saved=localStorage.getItem('scriptflow_theme_main'); if(saved==='dark') document.body.classList.add('dark'); document.getElementById('themeToggle').innerHTML=document.body.classList.contains('dark')?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>'; }
        function toggleTheme() { document.body.classList.toggle('dark'); const isDark=document.body.classList.contains('dark'); localStorage.setItem('scriptflow_theme_main',isDark?'dark':'light'); document.getElementById('themeToggle').innerHTML=isDark?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>'; showToast(`${isDark?'Dark mode':'Light mode'} enabled`); }
        function initSearch() { document.getElementById('scriptSearch').addEventListener('input',(e)=>{ searchTerm=e.target.value.toLowerCase(); renderNavigation(); }); }
        
        // Initialize everything
        loadAppointmentData(); loadScripts(); initTheme(); initSearch(); renderNavigation(); loadScript('opening'); initKeyboard();
        document.getElementById('editScriptBtn').addEventListener('click', enterEdit); document.getElementById('saveScriptBtn').addEventListener('click', saveEdit); document.getElementById('cancelEditBtn').addEventListener('click', cancelEdit); document.getElementById('copyScriptBtn').addEventListener('click', copyScript); document.getElementById('resetScriptBtn').addEventListener('click', resetScript); document.getElementById('themeToggle').addEventListener('click', toggleTheme); document.getElementById('addScriptBtn').addEventListener('click', addScript); document.getElementById('openCalendarBtn').addEventListener('click', openCalendarModal); document.getElementById('quickReportBtn').addEventListener('click', openQuickReport); document.getElementById('userNameBtn').addEventListener('click', setUserName); document.getElementById('helpBtn').addEventListener('click', openHelpModal); document.getElementById('priorityBtn').addEventListener('click', openPriorityModal); document.getElementById('historyBtn').addEventListener('click', () => showVersionHistoryModal(currentScriptId)); document.getElementById('resetAllBtn').addEventListener('click', factoryReset); document.getElementById('undoBtn').addEventListener('click', () => undoScript(currentScriptId)); document.getElementById('redoBtn').addEventListener('click', () => redoScript(currentScriptId));
        setInterval(() => { if(!isEditing) document.getElementById('saveStatus').innerHTML = 'Auto'; updateStats(); }, 5000);
    </script>
