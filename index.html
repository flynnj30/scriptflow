<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptFlow Pro</title>
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="menuToggleBtn" class="menu-toggle"><i class="fas fa-bars"></i></button>
    
    <div class="app-wrapper">
        <!-- SIDEBAR -->
        <aside id="mainSidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-microphone-alt"></i></div>
                    <div class="logo-text">
                        <h2>ScriptFlow Pro</h2>
                        <p>Dialer & CRM Manager</p>
                    </div>
                </div>
                <div id="userInfo" style="display: none;"></div>
            </div>
            
            <div class="search-area">
                <input type="text" id="scriptSearch" class="search-box" placeholder="Search scripts...">
            </div>

            <div class="scripts-list-section">
                <div class="section-title">Your Scripts</div>
                <div id="scriptListContainer" class="scripts-container"></div>
                <div style="padding: 0 16px;">
                    <button id="addScriptBtnSide" class="add-script-btn"><i class="fas fa-plus"></i> Add Script</button>
                </div>
            </div>

            <div class="tools-section">
                <div class="tools-header" id="toolsHeader">
                    <div class="section-title">Tools</div>
                    <i class="fas fa-chevron-right tools-chevron" id="toolsChevron"></i>
                </div>
                <div class="tools-menu" id="toolsMenu">
                    <div class="tool-item"><i class="fas fa-chart-pie"></i> Analytics Hub</div>
                    <div class="tool-item"><i class="fas fa-calendar-alt"></i> Appointment Calendar</div>
                    <div class="tool-item"><i class="fas fa-tasks"></i> Follow-up Tasks</div>
                    <div class="tool-item"><i class="fas fa-file-export"></i> Export CSV</div>
                    <div class="tool-item"><i class="fas fa-adjust"></i> Dark/Light Mode</div>
                    <div class="tool-item"><i class="fas fa-question-circle"></i> Help</div>
                    <div class="tool-item"><i class="fas fa-trash-alt"></i> Factory Reset</div>
                </div>
            </div>
            <div class="sidebar-footer">
                <button id="signOutBtn" style="background:none; border:none; width:100%;"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main id="mainContent" class="main-content">
            <div class="top-bar">
                <div class="stats-row">
                    <div class="stat"><span class="stat-label">Today:</span><span class="stat-number" id="statToday">0</span><span class="stat-label">/ <span id="goalDaily">0</span></span></div>
                    <div class="stat"><span class="stat-label">Week:</span><span class="stat-number" id="statWeek">0</span><span class="stat-label">/ <span id="goalWeekly">0</span></span></div>
                    <div class="stat"><span class="stat-label">Month:</span><span class="stat-number" id="statMonth">0</span><span class="stat-label">/ <span id="goalMonthly">0</span></span></div>
                    <div class="stat"><span class="stat-label">Avg Score:</span><span class="stat-number" id="avgScore">0</span></div>
                    <div class="stat"><span class="stat-label">Tasks:</span><span class="stat-number" id="pendingTasks">0</span></div>
                </div>
                <div class="action-buttons">
                    <span id="saveStatus" style="font-size: 0.8rem; color: var(--text-muted); margin-right: 10px;"><i class="fas fa-save"></i> Auto</span>
                    <button id="refreshBtn" class="btn-icon"><i class="fas fa-sync-alt"></i></button>
                    <button id="quickReportBtn" class="btn-icon"><i class="fas fa-bolt"></i> Quick Add</button>
                    <button id="bulkActionsBtn" class="btn-icon"><i class="fas fa-check-double"></i> Bulk</button>
                    <label class="csv-upload-btn btn-icon" id="csvUploadBtn">
                        <i class="fas fa-file-upload"></i> Import CSV
                        <input type="file" id="csvFileInput" accept=".csv">
                    </label>
                    <!-- CRM Dialer Trigger Button -->
                    <button id="toggleCrmBtn" class="btn-icon" style="background: var(--success); color: white; border-color: var(--success);">
                        <i class="fas fa-phone-alt"></i> Dialer
                    </button>
                </div>
            </div>

            <!-- SCRIPTS PANEL -->
            <div id="scriptPanel" class="script-card">
                <div class="script-header-bar">
                    <div class="script-title-area">
                        <h2 id="currentScriptName">Loading...</h2>
                        <span class="version-chip" id="versionNumber">1/1</span>
                        <span class="key-hint" id="activeShortcutHint">Key: 1</span>
                    </div>
                    <div class="action-buttons">
                        <button id="historyBtn" class="btn-icon" title="History"><i class="fas fa-history"></i></button>
                        <button id="undoBtn" class="btn-icon" title="Undo"><i class="fas fa-undo"></i></button>
                        <button id="redoBtn" class="btn-icon" title="Redo"><i class="fas fa-redo"></i></button>
                        <button id="copyScriptBtn" class="btn-icon" title="Copy"><i class="fas fa-copy"></i></button>
                        <button id="editScriptBtn" class="btn-icon"><i class="fas fa-edit"></i> Edit</button>
                        <button id="saveScriptBtn" class="btn-icon" style="display:none; background:var(--success); color:white;"><i class="fas fa-save"></i> Save</button>
                        <button id="cancelEditBtn" class="btn-icon" style="display:none;"><i class="fas fa-times"></i> Cancel</button>
                        <button id="resetScriptBtn" class="btn-icon" title="Reset to Default"><i class="fas fa-undo-alt"></i></button>
                    </div>
                </div>
                <div id="scriptContent" class="script-body"></div>
            </div>

            <!-- FEATURE PANEL (Calendar, Tasks, Analytics) -->
            <div id="featurePanel" class="feature-panel" style="display: none;">
                <div class="feature-panel-header">
                    <h2 id="featurePanelTitle">Feature</h2>
                    <div id="analyticsTabContainer" class="view-toggle" style="display:none;">
                        <button id="insightsTabBtn" class="view-btn active">Insights</button>
                        <button id="reportsTabBtn" class="view-btn">Reports</button>
                    </div>
                    <div id="calendarViewToggle" class="view-toggle" style="display:none;">
                        <button id="calendarViewBtn" class="view-btn active">Calendar</button>
                        <button id="listViewBtn" class="view-btn">List</button>
                    </div>
                    <div id="taskViewToggle" class="view-toggle" style="display:none;">
                        <button id="taskPendingBtn" class="view-btn active">Pending</button>
                        <button id="taskListViewBtn" class="view-btn">All Tasks</button>
                    </div>
                    <button id="closeFeaturePanelBtn" class="btn-icon"><i class="fas fa-times"></i></button>
                </div>
                <div id="featurePanelBody" class="feature-panel-body"></div>
            </div>
        </main>
    </div>

    <!-- CRM DIALER SIDE PANEL (Docked Right) -->
    <div id="crmPanel" class="crm-panel">
        <div class="crm-panel-header">
            <h3><i class="fas fa-headset" style="color: var(--primary);"></i> CRM Dialer</h3>
            <div style="display:flex; gap:12px; align-items:center;">
                <div class="crm-controls">
                    <button class="crm-zoom-btn" id="crmZoomOutBtn" title="Zoom Out"><i class="fas fa-minus"></i></button>
                    <span id="crmZoomLevel">100%</span>
                    <button class="crm-zoom-btn" id="crmZoomInBtn" title="Zoom In"><i class="fas fa-plus"></i></button>
                </div>
                <button class="btn-icon danger" id="closeCrmBtn" style="padding: 4px 10px;"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <div class="crm-iframe-wrapper">
            <!-- Includes necessary permissions for VoIP/WebRTC calls -->
            <iframe id="crmIframe" src="https://sales.regen-digital.com/campaigns/1f9164c5-48ce-42db-8af5-f6885d8f0077/dialer?mode=automatic" allow="microphone; camera; display-capture"></iframe>
        </div>
    </div>

    <!-- STATIC BULK ACTIONS MODAL -->
    <div id="bulkActionsModal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <h3><i class="fas fa-check-double"></i> Bulk Actions</h3>
            <div id="bulkSelectionContainer" style="max-height: 200px; overflow-y: auto; margin-bottom: 16px; border: 1px solid var(--border-color); border-radius: 12px; padding: 8px;"></div>
            <div class="form-group">
                <label>Action</label>
                <select id="bulkActionSelect">
                    <option value="">Select an action...</option>
                    <option value="status">Change Status</option>
                    <option value="tag">Add Tag</option>
                    <option value="delete">Delete Selected</option>
                    <option value="export">Export Selected (CSV)</option>
                </select>
            </div>
            <div id="bulkActionOptions" style="display: none;">
                <div class="form-group" id="bulkStatusGroup" style="display: none;">
                    <label>New Status</label>
                    <select id="bulkStatusSelect">
                        <option value="Warm Call Booked">Warm Call Booked</option>
                        <option value="Meeting Booked">Meeting Booked</option>
                        <option value="Canceled">Canceled</option>
                        <option value="Rescheduled">Rescheduled</option>
                        <option value="Held">Held</option>
                    </select>
                </div>
                <div class="form-group" id="bulkTagGroup" style="display: none;">
                    <label>Tag to Add</label>
                    <select id="bulkTagSelect">
                        <option value="qualified_warm_call">Qualified Warm Call</option>
                        <option value="unqualified_warm_callback">Unqualified Warm Callback</option>
                        <option value="vip">VIP</option>
                        <option value="negligent_warm_callback">Negligent Warm Callback</option>
                    </select>
                </div>
            </div>
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button id="executeBulkActionBtn" class="btn-icon" style="background: var(--primary); color: white;">Apply</button>
                <button id="closeBulkModalBtn" class="btn-icon">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
