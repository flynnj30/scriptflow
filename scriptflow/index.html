<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://accounts.google.com https://*.googleapis.com https://*.gstatic.com; script-src 'self' https://accounts.google.com https://*.googleapis.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.googleusercontent.com https://*.googleapis.com;">
    <title>ScriptFlow Pro | Google Sign-In</title>
    <!-- External Fonts & Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Local Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="mainApp" class="container">
        <div class="header">
            <h1><i class="fas fa-microphone-alt"></i> ScriptFlow Pro</h1>
            <div class="status-group">
                <div class="tracker-summary">
                    <div class="stat-pill"><i class="fas fa-calendar-day"></i> Today: <span class="number" id="statToday">0</span>/<span id="goalDaily">3</span></div>
                    <div class="stat-pill"><i class="fas fa-calendar-week"></i> Week: <span class="number" id="statWeek">0</span>/<span id="goalWeekly">15</span></div>
                    <div class="stat-pill"><i class="fas fa-calendar-alt"></i> Month: <span class="number" id="statMonth">0</span>/<span id="goalMonthly">60</span></div>
                    <button class="icon-btn feature-btn" data-feature="true" id="openCalendarBtn"><i class="fas fa-calendar-alt"></i></button>
                    <button class="icon-btn feature-btn" data-feature="true" id="quickReportBtn"><i class="fas fa-plus-circle"></i></button>
                    <button class="icon-btn feature-btn" data-feature="true" id="exportCsvBtn"><i class="fas fa-file-csv"></i></button>
                    <button class="icon-btn feature-btn" data-feature="true" id="userNameBtn"><i class="fas fa-user-circle"></i></button>
                    <button class="icon-btn feature-btn" data-feature="true" id="priorityBtn"><i class="fas fa-chart-line"></i></button>
                </div>
                <div class="badge badge-primary"><i class="fas fa-scroll"></i> <span id="scriptCount">0</span></div>
                <div class="badge badge-success" id="saveStatus"><i class="fas fa-save"></i> Auto</div>
                <button class="icon-btn feature-btn" data-feature="true" id="historyBtn"><i class="fas fa-history"></i></button>
                <button class="icon-btn feature-btn" data-feature="true" id="resetAllBtn"><i class="fas fa-trash-alt"></i></button>
                <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
                <button class="icon-btn feature-btn" data-feature="true" id="helpBtn"><i class="fas fa-question-circle"></i></button>
                
                <!-- Google Icon Button -->
                <div id="googleButtonContainer">
                    <button id="googleIconBtn" class="google-icon-btn">
                        <i class="fab fa-google"></i> Sign In
                    </button>
                </div>
                <div id="userProfileContainer" style="display: none;">
                    <div id="userProfileBtn" class="user-avatar-btn">
                        <img id="userAvatarImg" class="user-avatar-img" src="" alt="Avatar">
                        <span id="userNameSpan"></span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="main-grid">
            <div class="nav-sidebar">
                <div class="section-title">
                    <span><i class="fas fa-bars"></i> CALL SCRIPTS</span>
                    <button class="icon-btn feature-btn" data-feature="true" id="addScriptBtn"><i class="fas fa-plus"></i></button>
                </div>
                <input type="text" id="scriptSearch" class="search-box feature-input" data-feature="true" placeholder="Search scripts...">
                <div id="scriptNavList"></div>
            </div>
            
            <div class="script-area">
                <div class="script-header">
                    <div class="script-title">
                        <i class="fas fa-scroll"></i> <span id="currentScriptName">Opening Script</span>
                        <span id="activeShortcutHint" style="font-size:0.7rem; background:var(--bg-primary); padding:2px 10px; border-radius:20px;"><i class="fas fa-key"></i> Key: —</span>
                        <span id="versionIndicator" class="version-indicator"><i class="fas fa-clock"></i> v<span id="versionNumber">1</span></span>
                    </div>
                    <div class="action-buttons">
                        <button class="icon-btn feature-btn" data-feature="true" id="editScriptBtn"><i class="fas fa-pen"></i></button>
                        <button class="icon-btn" id="saveScriptBtn" style="display:none;"><i class="fas fa-save"></i></button>
                        <button class="icon-btn" id="cancelEditBtn" style="display:none;"><i class="fas fa-times"></i></button>
                        <button class="icon-btn feature-btn" data-feature="true" id="copyScriptBtn"><i class="fas fa-copy"></i></button>
                        <button class="icon-btn feature-btn" data-feature="true" id="resetScriptBtn"><i class="fas fa-undo-alt"></i></button>
                        <button class="icon-btn feature-btn" data-feature="true" id="undoBtn"><i class="fas fa-undo"></i></button>
                        <button class="icon-btn feature-btn" data-feature="true" id="redoBtn"><i class="fas fa-redo"></i></button>
                    </div>
                </div>
                <div id="scriptContent"></div>
            </div>
        </div>
        <div class="footer"><i class="fab fa-google"></i> Click the Google button above to sign in and unlock all features</div>
    </div>

    <div id="disabledOverlay" class="disabled-overlay">
        <div class="disabled-message">
            <i class="fab fa-google"></i>
            <h3>Sign In Required</h3>
            <p>Please click the Google Sign In button in the top-right corner to access all features.</p>
            <button id="closeOverlayBtn" class="icon-btn" style="margin-top: 16px; background: var(--primary); color: white;">OK, I'll Sign In</button>
        </div>
    </div>

    <!-- Local JavaScript -->
    <script src="script.js"></script>
</body>
</html>
